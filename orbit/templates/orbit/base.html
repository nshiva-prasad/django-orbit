<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Orbit{% endblock %}</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        orbit: {
                            bg: {
                                primary: '#020617',   /* slate-950 */
                                secondary: '#0f172a', /* slate-900 */
                                tertiary: '#1e293b',  /* slate-800 */
                            },
                            border: '#334155',        /* slate-700 */
                            text: {
                                primary: '#f1f5f9',   /* slate-100 */
                                secondary: '#94a3b8', /* slate-400 */
                                muted: '#64748b',     /* slate-500 */
                            },
                            accent: {
                                cyan: '#22d3ee',
                                amber: '#fbbf24',
                                rose: '#fb7185',
                                emerald: '#34d399',
                                violet: '#a78bfa',
                            }
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(34, 211, 238, 0.3)' },
                            '100%': { boxShadow: '0 0 20px rgba(34, 211, 238, 0.6)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Alpine.js (+ collapse plugin for smooth nav group toggles) -->
    <script defer src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /*
         * Orbit design system — see DESIGN.md at the repo root.
         * Philosophy: hierarchy over decoration; calm by default, loud on problems.
         * Decorative effects (glow/gradient/grid) are accents, reserved for the brand
         * mark and the single live-status dot — never for cards or rows.
         */

        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Glow effects — softened; reserved for brand mark / live dot only */
        .glow-cyan {
            box-shadow: 0 0 12px rgba(34, 211, 238, 0.25);
        }
        .glow-rose {
            box-shadow: 0 0 12px rgba(251, 113, 133, 0.25);
        }
        .glow-amber {
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.25);
        }
        .glow-emerald {
            box-shadow: 0 0 12px rgba(52, 211, 153, 0.25);
        }

        /* Gradient text — reserved for the wordmark */
        .text-gradient {
            background: linear-gradient(135deg, #22d3ee 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Grid pattern background — very subtle, app shell only */
        .bg-grid {
            background-image:
                linear-gradient(rgba(51, 65, 85, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(51, 65, 85, 0.06) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Component helpers (see DESIGN.md › Components) */
        .orbit-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
        }
        .orbit-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.6875rem;
            line-height: 1rem;
            font-weight: 500;
            padding: 0.125rem 0.5rem;
            border-radius: 9999px;
            background: #1e293b;
            color: #94a3b8;
        }
        .orbit-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #94a3b8;
        }

        /* Hide Alpine-controlled elements until Alpine initializes (prevents the
           detail slide-over from flashing open on page load) */
        [x-cloak] { display: none !important; }

        /* Honor reduced-motion preferences */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }

        /* JSON syntax highlighting */
        .json-key { color: #22d3ee; }
        .json-string { color: #34d399; }
        .json-number { color: #fbbf24; }
        .json-boolean { color: #a78bfa; }
        .json-null { color: #fb7185; }
        
        /* Entry row hover effect */
        .entry-row {
            transition: all 0.2s ease;
        }
        .entry-row:hover {
            background: rgba(34, 211, 238, 0.05);
            border-left-color: #22d3ee;
        }
        
        /* Status indicator pulse */
        .status-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        /* Slide-over panel animation */
        .slide-over-enter {
            transform: translateX(100%);
        }
        .slide-over-leave {
            transform: translateX(0);
        }
        
        /* HTMX loading indicator */
        .htmx-request .htmx-indicator {
            opacity: 1;
        }
        .htmx-indicator {
            opacity: 0;
            transition: opacity 200ms ease-in;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-orbit-bg-primary text-orbit-text-primary font-sans antialiased">
    {% block body %}{% endblock %}
    
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Re-initialize icons after HTMX swaps
        document.body.addEventListener('htmx:afterSwap', function(event) {
            lucide.createIcons();
        });
        
        // JSON syntax highlighting function
        function syntaxHighlight(json) {
            if (typeof json !== 'string') {
                json = JSON.stringify(json, null, 2);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        async function copyElement(button) {
            const target = document.getElementById(button.dataset.copyTarget);

            if (!target || button.disabled) {
                return;
            }

            button.disabled = true;

            try {
                await navigator.clipboard.writeText(target.textContent.trim());

                const original = button.innerHTML;

                button.innerHTML = `
                    <span class="flex items-center gap-1 text-emerald-400 text-xs">
                        <i data-lucide="check" class="w-4 h-4"></i>
                        Copied
                    </span>
                `;

                lucide.createIcons();

                setTimeout(() => {
                    button.innerHTML = original;
                    button.disabled = false;
                    lucide.createIcons();
                }, 1500);

            } catch (err) {
                button.disabled = false;
                console.error("Failed to copy:", err);
            }
        }

        document.addEventListener("click", (event) => {
            const button = event.target.closest(".orbit-copy-btn");

            if (!button) {
                return;
            }

            copyElement(button);
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
